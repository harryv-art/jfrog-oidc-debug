name: OIDC Debug

on:
  workflow_dispatch:
    inputs:
      oidc_provider:
        description: 'OIDC provider name configured in JFrog'
        required: false
        default: 'github'
      oidc_audience:
        description: 'OIDC audience'
        required: false
        default: 'jfrog-github'
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  oidc-debug:
    runs-on: ubuntu-latest
    env:
      JFROG_CLI_LOG_LEVEL: DEBUG
      JF_URL: ${{ vars.JF_URL }}
      OIDC_PROVIDER: ${{ inputs.oidc_provider || 'github' }}
      OIDC_AUDIENCE: ${{ inputs.oidc_audience || 'jfrog-github' }}

    steps:

      # ── 1. GitHub OIDC JWT claims ─────────────────────────────────
      - name: "1 · Dump raw GitHub OIDC JWT claims"
        run: |
          echo "::group::GitHub OIDC claims (available for JFrog identity mapping rules)"

          RAW=$(curl -fsSL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${OIDC_AUDIENCE}" | jq -r '.value')

          PAYLOAD=$(RAW_JWT="$RAW" python3 -c "
          import os, base64, json
          raw = os.environ['RAW_JWT']
          part = raw.split('.')[1]
          pad = 4 - len(part) % 4
          print(json.dumps(json.loads(base64.urlsafe_b64decode(part + '=' * (pad % 4))), indent=2))
          ")

          echo "Full JWT payload:"
          echo "$PAYLOAD" | jq .
          echo ""
          echo "Claims table (use these field names in JFrog identity mapping rules):"
          printf "  %-35s %s\n" "CLAIM" "VALUE"
          printf "  %-35s %s\n" "─────" "─────"
          for claim in sub iss aud repository repository_id repository_owner \
                       repository_owner_id ref ref_type sha event_name actor \
                       actor_id workflow workflow_ref workflow_sha \
                       job_workflow_ref environment runner_environment; do
            val=$(echo "$PAYLOAD" | jq -r --arg c "$claim" '.[$c] // "(not present)"')
            printf "  %-35s %s\n" "$claim" "$val"
          done
          echo "::endgroup::"

      # ── 2. OIDC exchange ──────────────────────────────────────────
      - name: "2 · JFrog CLI setup (OIDC exchange)"
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ vars.JF_URL }}
        with:
          oidc-provider-name: ${{ env.OIDC_PROVIDER }}
          oidc-audience: ${{ env.OIDC_AUDIENCE }}
          disable-auto-build-publish: true   # ← add this

      - name: "2.5 · Verify JFrog CLI configuration"
        run: |
          echo "JF_URL value: '${{ vars.JF_URL }}'"
          echo "JFROG_CLI_ACCESS_TOKEN set: $([ -n "$JFROG_CLI_ACCESS_TOKEN" ] && echo YES || echo NO)"
          echo ""
          jf config show
          if ! jf config show 2>&1 | grep -qi "url"; then
            echo "::error::No JFrog server configured — check that vars.JF_URL is set and the OIDC provider 'github' exists on harryv1.jfrog.io"
            exit 1
          fi

      # ── 3. Decoded JFrog token ────────────────────────────────────
      - name: "3 · Decode JFrog access token (resolved principal)"
        run: |
          echo "::group::JFrog access token claims (post-exchange resolved subject)"
          python3 - <<'PYEOF'
          import json, glob, os, base64

          conf_files = sorted(glob.glob(os.path.expanduser('~/.jfrog/jfrog-cli.conf*')))
          if not conf_files:
              print('No config file found'); exit()

          with open(conf_files[-1]) as f:
              conf = json.load(f)

          servers = conf.get('servers', [])
          if not servers:
              print('No servers in config'); exit()

          token = servers[0].get('accessToken', '')
          if not token:
              print('No accessToken in config'); exit()

          # Decode payload only — never print the raw token
          part = token.split('.')[1]
          pad = 4 - len(part) % 4
          payload = json.loads(base64.urlsafe_b64decode(part + '=' * (pad % 4)))
          print(json.dumps(payload, indent=2))

          print("\nKey fields:")
          for f in ['sub', 'scp', 'scope', 'ext', 'exp']:
              print(f"  {f:<10} {payload.get(f, '(not present)')}")
          PYEOF
          echo "::endgroup::"

      # ── 4. Effective identity ─────────────────────────────────────
      - name: "4 · Effective identity on the platform"
        run: |
          echo "::group::Effective identity"

          echo "--- jf config show ---"
          jf config show
          echo ""

          echo "--- Platform ping ---"
          jf rt curl -X GET "/api/system/ping"
          echo ""

          echo "--- User details (GET /access/api/v2/users/{username}) ---"
          python3 - <<'PYEOF'
          import json, glob, os, base64
          import urllib.request, urllib.error

          conf_files = sorted(glob.glob(os.path.expanduser('~/.jfrog/jfrog-cli.conf*')))
          with open(conf_files[-1]) as f:
              conf = json.load(f)

          token = conf['servers'][0]['accessToken']
          base_url = conf['servers'][0]['url'].rstrip('/')

          # Extract username from JWT sub
          # sub format: jfrt@<instance>/users/<username>
          part = token.split('.')[1]
          pad = 4 - len(part) % 4
          payload = json.loads(base64.urlsafe_b64decode(part + '=' * (pad % 4)))
          sub = payload.get('sub', '')
          username = sub.split('/users/')[-1] if '/users/' in sub else sub

          print(f"sub from token:  {sub}")
          print(f"resolved username: {username}")
          print()

          url = f"{base_url}/access/api/v2/users/{username}"
          print(f"GET {url}")
          req = urllib.request.Request(url, headers={'Authorization': f'Bearer {token}'})
          try:
              with urllib.request.urlopen(req) as resp:
                  print(json.dumps(json.loads(resp.read()), indent=2))
          except urllib.error.HTTPError as e:
              body = e.read().decode()
              print(f"HTTP {e.code}: {body}")
              if e.code == 403:
                  print("(403 expected — OIDC token likely lacks admin scope to read user details)")
                  print("Use the decoded JWT payload from Step 3 for principal info instead.")
          except Exception as e:
              print(f"Error: {e}")
          PYEOF

          echo "::endgroup::"

      # ── 5. Checkout (needed for build-add-git) ───────────────────
      - name: "5 · Checkout"
        uses: actions/checkout@v4

      # ── 6. Upload a test artifact ─────────────────────────────────
      - name: "6 · Upload test artifact"
        run: |
          echo "::group::Artifact upload"
          echo "oidc-probe  run=$GITHUB_RUN_ID  sha=$GITHUB_SHA  $(date -u)" > probe.txt
          jf rt upload probe.txt oidc-test-local/ --fail-no-op
          echo "::endgroup::"

      # ── 7. Build-info: collect + publish ─────────────────────────
      # This is the exact sequence that fails in case 413818.
      # JFROG_CLI_BUILD_NAME / BUILD_NUMBER are set by setup-jfrog-cli.
      - name: "7 · Publish build info"
        run: |
          echo "::group::Build info publish"
          echo "Build name:   $JFROG_CLI_BUILD_NAME"
          echo "Build number: $JFROG_CLI_BUILD_NUMBER"
          echo ""

          echo "--- collect env ---"
          jf rt build-collect-env

          echo "--- add git ---"
          jf rt build-add-git

          echo "--- build-publish (jf rt bp) ---"
          jf rt build-publish
          echo "::endgroup::"

      # ── 8. Build scan ─────────────────────────────────────────────
      - name: "8 · Build scan"
        run: |
          echo "::group::Build scan"
          jf build-scan --fail=false
          echo "::endgroup::"
